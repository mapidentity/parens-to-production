# /etc/systemd/journald.conf.d/myapp.conf — give the forensic window a
# floor. The whole logging story (ch.35, ch.37) ends at journald with
# "retention is the supervisor's"; this is the supervisor being told.
# Without it, journald's default volatile/auto storage can evict the very
# lines an incident needs. The security log (ch.42) is a file of its own,
# but the access log and app WARN/ERROR live here.
[Journal]
# Persist across reboots — a crash must not erase the run-up to it.
Storage=persistent
# Bound the on-disk size so logs can't fill the disk (which ch.38's
# watchdog would then alert on — but prevention beats the alert).
SystemMaxUse=2G
# Keep at least a month, so a slow-burn incident is still reconstructable.
MaxRetentionSec=1month
