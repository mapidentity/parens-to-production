# fail2ban filter for myapp's security log (resources/logback.xml routes
# myapp.web.security here). The failregex keys <HOST> on the `ip=` field
# the security module writes — that format is a CONTRACT (see
# src/myapp/web/security.clj); change one, change both.
[Definition]

# Any auth.failure or auth.replay line is a failed credential event.
# admin.denied and tenancy.refused are probes worth counting too, but we
# scope the JAIL to the auth events (brute force is the ban-worthy case);
# the others feed forensics, not the ban decision.
#
# The regex is ANCHORED to the ip field, not `.*ip=`: `ip` is always the
# first field the security module emits, so <HOST> binds to the real
# client. A greedy `.*ip=` would instead bind to the LAST `ip=` on the
# line — which an attacker could smuggle into a later field — so anchoring
# is load-bearing (belt to the `fmt` value sanitization's suspenders).
failregex = ^.* SECURITY event=auth\.failure ip=<HOST>\b
            ^.* SECURITY event=auth\.replay ip=<HOST>\b

# No line is a *success* signal to un-count against; fail2ban tracks
# failures only.
ignoreregex =

# The ISO-8601 stamp logback writes, so fail2ban reads each line's own
# time rather than mtime — INCLUDING the fraction and the zone. Logback
# stamps in UTC (the trailing Z); a zone-less pattern here would make
# fail2ban read that wall-clock as SERVER-LOCAL time, so on any box not
# running UTC every event lands hours off and the findtime window never
# sees a brute-force burst. Drilled with fail2ban-regex under
# TZ=America/New_York: the zone-less pattern read the line 4h wrong, this
# one is exact.
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S\.%%f%%z
