# fail2ban filter for myapp's security log (resources/logback.xml routes
# myapp.web.security here). The failregex keys <HOST> on the `ip=` field
# the security module writes — that format is a CONTRACT (see
# src/myapp/web/security.clj); change one, change both.
[Definition]

# Any auth.failure or auth.replay line is a failed credential event.
# admin.denied and tenancy.refused are probes worth counting too, but we
# scope the JAIL to the auth events (brute force is the ban-worthy case);
# the others feed forensics, not the ban decision.
failregex = ^.* SECURITY event=auth\.failure .*ip=<HOST>\b
            ^.* SECURITY event=auth\.replay .*ip=<HOST>\b

# No line is a *success* signal to un-count against; fail2ban tracks
# failures only.
ignoreregex =

# The ISO-8601 stamp logback writes, so fail2ban reads each line's own
# time rather than mtime.
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
