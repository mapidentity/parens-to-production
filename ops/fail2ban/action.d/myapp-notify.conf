# A fail2ban action that emails the operator on ban, through the box's own
# alert path (ops/myapp-alert.sh) rather than fail2ban's built-in MTA
# actions — one notification channel for every incident, banned IPs
# included.
[Definition]
actionban = /etc/scripts/myapp-notify.sh "fail2ban: <name> banned <ip>" "fail2ban banned <ip> from the <name> jail (repeated auth failures). Ban is temporary; see security.log for the events."
actionunban =
actionstart =
actionstop =
actioncheck =
