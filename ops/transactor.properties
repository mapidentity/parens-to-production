# Datomic transactor, SQL storage protocol — trimmed from the sample the
# distribution ships (config/samples/sql-transactor-template.properties).
# Both application databases (myapp, myapp-analytics) live in this one
# storage; a transactor serializes writes for every database in it.
protocol=sql
# 127.0.0.1, NOT localhost: `host=` is both the bind address and the
# address the transactor WRITES INTO STORAGE for peers to find it. On a
# dual-stack box a peer resolving `localhost` may try ::1 first while the
# transactor listens on IPv4 — and the peer hangs forever with no error.
# The failover lab (ops/lab/) hit exactly this; pin the literal.
host=127.0.0.1
port=4334

sql-url=jdbc:postgresql://localhost:5432/datomic
sql-user=datomic
sql-password=datomic
sql-driver-class=org.postgresql.Driver

# Memory settings from the template's small-instance profile. The
# transactor's sizing story (and its metrics) belong to the operations
# volume; these defaults carry a single-node catalog comfortably.
memory-index-threshold=32m
memory-index-max=256m
object-cache-max=128m
