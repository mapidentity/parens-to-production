#!/usr/sbin/nft -f
# ops/nftables.conf — the box's default-deny firewall. Install to
# /etc/nftables.conf and `systemctl enable --now nftables`. This is the
# packet-level backstop for what ch.35 already did by bind address: the
# datastore (transactor 4334, PostgreSQL 5432) is loopback-only by config
# AND now unreachable from outside by rule — two independent walls, so one
# misconfiguration is not an exposure.
#
# fail2ban runs its own table (inet f2b-table) for temporary bans; this
# base table does not touch it — which is why the reload below replaces
# ONLY this table. A `flush ruleset` here would atomically destroy
# f2b-table too, dropping every active ban each time the base firewall
# reloads: the two-owners rule is only true if each owner scopes its
# writes. (Declare-then-delete makes the delete idempotent: the bare
# declaration creates the table if absent, so the delete never errors.)

table inet firewall
delete table inet firewall

table inet firewall {
	# Per-source SSH accounting (v4/v6): a dynamic set so the rate limit
	# below is per client address, not one global bucket. Bounded and
	# expiring, so a spray cannot grow it without limit.
	set ssh4 {
		type ipv4_addr
		flags dynamic
		timeout 1m
		size 65535
	}

	set ssh6 {
		type ipv6_addr
		flags dynamic
		timeout 1m
		size 65535
	}

	chain input {
		type filter hook input priority filter; policy drop;

		# Established flows and loopback: the app↔proxy↔datastore traffic
		# all rides loopback, so allowing lo is what keeps the box working
		# while everything else defaults closed.
		ct state established,related accept
		ct state invalid drop
		iif "lo" accept

		# Diagnostics: let the box be pinged.
		ip protocol icmp icmp type echo-request accept
		ip6 nexthdr icmpv6 accept

		# SSH, rate-limited PER SOURCE: five new connections per minute
		# per client address blunts a credential-spray at the packet level
		# before it reaches sshd. Per-source matters twice over: a global
		# bucket would let one hostile host exhaust the whole allowance and
		# lock the operator out of their own box mid-incident — the limiter
		# becoming the DoS. The add-to-set expression stops matching when
		# that source exceeds its rate, so the packet falls through to the
		# chain's default drop. (Key-only auth is sshd's job; this is depth.)
		tcp dport 22 ct state new add @ssh4 { ip saddr limit rate 5/minute } accept
		tcp dport 22 ct state new add @ssh6 { ip6 saddr limit rate 5/minute } accept

		# The only application ports the internet may reach: Caddy's.
		# Everything the app and datastore expose is behind it, on loopback.
		tcp dport { 80, 443 } accept

		# Everything else — including 3000-3002, 4334, 5432 — is dropped by
		# the chain policy. No rule needs to name them; default-deny does.
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
