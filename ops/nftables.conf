#!/usr/sbin/nft -f
# ops/nftables.conf — the box's default-deny firewall. Install to
# /etc/nftables.conf and `systemctl enable --now nftables`. This is the
# packet-level backstop for what ch.35 already did by bind address: the
# datastore (transactor 4334, PostgreSQL 5432) is loopback-only by config
# AND now unreachable from outside by rule — two independent walls, so one
# misconfiguration is not an exposure.
#
# fail2ban runs its own table (inet f2b-table) for temporary bans; this
# base table does not touch it.

flush ruleset

table inet firewall {
	chain input {
		type filter hook input priority filter; policy drop;

		# Established flows and loopback: the app↔proxy↔datastore traffic
		# all rides loopback, so allowing lo is what keeps the box working
		# while everything else defaults closed.
		ct state established,related accept
		ct state invalid drop
		iif "lo" accept

		# Diagnostics: let the box be pinged.
		ip protocol icmp icmp type echo-request accept
		ip6 nexthdr icmpv6 accept

		# SSH, rate-limited: five new connections per minute per source
		# blunts a credential-spray at the packet level before it reaches
		# sshd. (Key-only auth is sshd's job; this is depth.)
		tcp dport 22 ct state new limit rate 5/minute accept

		# The only application ports the internet may reach: Caddy's.
		# Everything the app and datastore expose is behind it, on loopback.
		tcp dport { 80, 443 } accept

		# Everything else — including 3000-3002, 4334, 5432 — is dropped by
		# the chain policy. No rule needs to name them; default-deny does.
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
