# Failover-lab transactor B (the standby that must take over).
# Identical to ops/lab/txor-a.properties except for the port. Same storage,
# so on boot B sees A holding the lease and waits as standby WITHOUT binding
# its serving port — it only binds 4335 once it promotes. See ops/lab/DRILL.md.
protocol=sql
host=127.0.0.1
port=4335

sql-url=jdbc:postgresql://localhost:5432/datomic
sql-user=datomic
sql-password=datomic
sql-driver-class=org.postgresql.Driver

memory-index-threshold=32m
memory-index-max=256m
object-cache-max=128m
