# Failover-lab transactor A (the initially-active node).
#
# Derived from ops/transactor.properties, the production config, with two
# single-host lab differences ONLY:
#   - host=127.0.0.1  (not `localhost`: on a dual-stack box `localhost` can
#     resolve to ::1 first, and a peer that dials ::1 never reaches a
#     transactor bound to IPv4 — pin it so the lab is reproducible)
#   - port=4334 for A, 4335 for B (two transactors, one host, distinct ports)
#
# Both A and B point at the SAME storage, which is how Datomic Pro coordinates
# the active/standby pair: whichever transactor holds the storage lease serves;
# the other waits. See ops/lab/DRILL.md.
protocol=sql
host=127.0.0.1
port=4334

sql-url=jdbc:postgresql://localhost:5432/datomic
sql-user=datomic
sql-password=datomic
sql-driver-class=org.postgresql.Driver

memory-index-threshold=32m
memory-index-max=256m
object-cache-max=128m
