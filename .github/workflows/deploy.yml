name: Deploy mdBook site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.43
      MDBOOK_MERMAID_VERSION: 0.14.0
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook + mdbook-mermaid
        run: |
          mkdir -p "$HOME/.cargo/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          # Download to a file first (so a transient 5xx never feeds a partial
          # stream to tar), failing on HTTP errors and retrying with backoff.
          curl --proto '=https' --tlsv1.2 -fLsS \
            --retry 5 --retry-delay 5 --retry-all-errors \
            -o /tmp/mdbook.tar.gz "$url"
          tar -xzf /tmp/mdbook.tar.gz -C "$HOME/.cargo/bin"
          # The mermaid preprocessor the diagram fences need — book.toml
          # declares [preprocessor.mermaid], so the build fails without it.
          mm="https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl --proto '=https' --tlsv1.2 -fLsS \
            --retry 5 --retry-delay 5 --retry-all-errors \
            -o /tmp/mdbook-mermaid.tar.gz "$mm"
          tar -xzf /tmp/mdbook-mermaid.tar.gz -C "$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with mdBook
        run: mdbook build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
