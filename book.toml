[book]
title = "Parens to Production"
description = "A server-rendered, framework-free Clojure/Datomic SaaS — built, operated, and defended on one box you own."
authors = ["P. de Kruif"]
language = "en"
src = "chapters"

[output.html]
smart-punctuation = true
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/mapidentity/parens-to-production"
edit-url-template = ""
copy-fonts = true
no-section-label = false
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
