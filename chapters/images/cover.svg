<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#18243f"/>
      <stop offset="55%" stop-color="#111a30"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1800" fill="url(#bg)"/>

  <!-- the one box you own: a restrained hairline frame -->
  <rect x="84" y="84" width="1032" height="1632" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- brand lineage mark: a fork (root in amber, two children) -->
  <g fill="none" stroke="#4f46e5" stroke-width="3.4" stroke-linecap="round">
    <line x1="600" y1="228" x2="558" y2="300"/>
    <line x1="600" y1="228" x2="642" y2="300"/>
    <circle cx="558" cy="300" r="12" fill="#111a30"/>
    <circle cx="642" cy="300" r="12" fill="#111a30"/>
  </g>
  <circle cx="600" cy="228" r="13" fill="#f59e0b"/>

  <!-- the parentheses that hold the expression (centered on the title's optical
       middle: the "to") -->
  <g fill="none" stroke="#4f46e5" stroke-width="21" stroke-linecap="round">
    <path d="M 240 619 C 130 735, 130 975, 240 1091"/>
    <path d="M 960 619 C 1070 735, 1070 975, 960 1091"/>
  </g>

  <!-- title: both words justified to one measure (770), clearing the parens -->
  <text x="600" y="796" text-anchor="middle" textLength="770" lengthAdjust="spacing"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="800"
        font-size="108" fill="#fafaf9">PARENS</text>

  <text x="600" y="866" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-style="italic" font-weight="500"
        font-size="50" letter-spacing="10" fill="#94a3b8">to</text>

  <text x="600" y="996" text-anchor="middle" textLength="770" lengthAdjust="spacing"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="800"
        font-size="108" fill="#f59e0b">PRODUCTION</text>

  <!-- subtitle: the distinctive how, landing on the no-lock-in crux; the stack
       set in bright white so amber stays PRODUCTION's alone -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="400"
     font-size="30" letter-spacing="0.4" fill="#cbd5e1" text-anchor="middle">
    <text x="600" y="1214">A framework-free, server-rendered</text>
    <text x="600" y="1260" fill="#fafaf9" font-weight="700">Clojure + Datomic SaaS,</text>
    <text x="600" y="1306">on one box, tied to no cloud.</text>
  </g>

  <!-- author -->
  <line x1="558" y1="1400" x2="642" y2="1400" stroke="#d97706" stroke-width="2.5"/>
  <text x="600" y="1494" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700"
        font-size="42" letter-spacing="7" fill="#fafaf9">P. de Kruif</text>

  <!-- the book's method, in its own syntax -->
  <text x="600" y="1608" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="26" letter-spacing="1.5" fill="#64748b">;; verified, not promised</text>
</svg>
