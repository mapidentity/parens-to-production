services:
  myapp:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile
    hostname: myapp
    depends_on:
      certificates:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash"]
    command: ["-c", "/workspace/.devcontainer/importcerts.sh && tail -f /dev/null"]
    environment:
      - DISPLAY=$DISPLAY
      - XAUTHORITY=/tmp/.Xauthority
      - CA_CERTS=/certificates/rootCA.crt
    volumes:
      # - /run/user/1000/docker.sock:/var/run/docker.sock
      - .:/workspace:cached
      - certificates:/certificates
      - /tmp/.X11-unix:/tmp/.X11-unix/
    networks:
      default:
      myapp-network:

  # A one time service that creates the SSL certificates.
  certificates:
    image: eclipse-temurin:25-jre-alpine
    entrypoint: ["/bin/ash"]
    command: "/opt/createcerts.sh"
    working_dir: /certificates
    volumes:
      - certificates:/certificates
      - ./certificates/createcerts.sh:/opt/createcerts.sh:ro
      - ./certificates/openssl.cnf:/opt/openssl.cnf:ro

  # A web browser for visiting containered applications.
  # run `xhost +local:` to allow the container to connect to the X server.
  browser:
    build:
      context: ./browser
      dockerfile: Dockerfile
    hostname: browser
    environment:
      - DISPLAY=$DISPLAY
      - XAUTHORITY=/tmp/.Xauthority
      - CA_CERTS=/certs/rootCA.crt
    cap_drop:
      - MKNOD
      - NET_RAW
      - AUDIT_WRITE
    depends_on:
      ingress:
        condition: service_started
      certificates:
        condition: service_completed_successfully
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix/
      - certificates:/certs:ro
      - ./Downloads:/root/Downloads

  # Reverse proxy for HTTPS (TLS) traffic to containered services.
  # Also serves static files (myapp/static/) directly.
  ingress:
    image: docker.io/library/caddy:2-alpine
    hostname: ingress
    depends_on:
      certificates:
        condition: service_completed_successfully
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./myapp/static:/static:ro
      - certificates:/certs
    expose:
      - "80"
      - "443"
    networks:
      default:
        aliases:
          - "myapp.lan"
          - "mailpit.lan"
      myapp-network:

  mailpit:
    image: axllent/mailpit:latest
    container_name: myapp-mailpit
    expose:
      - "1025"  # SMTP
      - "8025"  # Web interface
    networks:
      - myapp-network
    healthcheck:
      test: ["CMD-SHELL", "/mailpit readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  certificates:
    driver: local

networks:
  myapp-network:
    driver: bridge
